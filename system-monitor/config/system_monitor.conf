# 시스템 모니터링 설정 파일
# 경로: /etc/system_monitor/system_monitor.conf

# 이메일 설정
EMAIL_TO="stephen@clobot.co.kr"
EMAIL_FROM="system-monitor@$(hostname -f)"
SMTP_SERVER="smtp.yourcompany.com"
SMTP_PORT="587"

# JANDI 설정
JANDI_WEBHOOK_URL="YOUR_JANDI_WEBHOOK_URL"
JANDI_ROOM_NAME="monitoring-alerts"

# 모니터링 간격 (초)
CHECK_INTERVAL=300

# 로그 설정
LOG_LEVEL="INFO"
MAX_LOG_SIZE="100M"
LOG_RETENTION_DAYS=30

# VM 모니터링 활성화 (KVM 호스트에서만 true)
MONITOR_VMS=true

# 추가 서비스 모니터링
ADDITIONAL_SERVICES="nginx,mysql,docker,redis"

ENABLE_ANOMALY_DETECTION=true
MONITOR_CONTAINERS=true
MONITOR_NETWORK_SECURITY=true
ENABLE_PERFORMANCE_PREDICTION=true
ALERT_COOLDOWN_MINUTES=30
MAX_ALERTS_PER_HOUR=10
