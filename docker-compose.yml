# =============================================================================
# Infrastructure Monitoring Stack
# 구성: Prometheus + Alertmanager + Grafana + Exporters
#
# 시작: cp .env.example .env && vi .env && docker compose up -d
# =============================================================================

networks:
  monitoring-tier:
    driver: bridge

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:

services:

  # ---------------------------------------------------------------------------
  # Prometheus (메트릭 수집)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: always
    user: "65534:65534"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    environment:
      - DATACENTER=${DATACENTER:-your-datacenter}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=180d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.listen-address=0.0.0.0:9099'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--log.level=warn'
    ports:
      - "127.0.0.1:9099:9099"
    networks:
      - monitoring-tier
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9099/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Alertmanager (알람 라우팅)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    restart: always
    user: "65534:65534"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--cluster.listen-address='
      - '--log.level=warn'
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring-tier
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Grafana (시각화 대시보드)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: always
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme!}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,grafana-polystat-panel
      - GF_UNIFIED_ALERTING_ENABLED=false
      - TZ=Asia/Seoul
    networks:
      - monitoring-tier
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # SNMP Exporter (네트워크 장비 모니터링)
  # ---------------------------------------------------------------------------
  snmp-exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: snmp-exporter
    restart: always
    volumes:
      - ./snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "127.0.0.1:9116:9116"
    networks:
      - monitoring-tier

  # ---------------------------------------------------------------------------
  # Blackbox Exporter (HTTP/ICMP 엔드포인트 가용성)
  # ---------------------------------------------------------------------------
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: always
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "127.0.0.1:9115:9115"
    networks:
      - monitoring-tier
    cap_add:
      - NET_RAW

  # ---------------------------------------------------------------------------
  # Jandi Webhook Adapter (잔디 알람 — 다른 메신저 사용 시 교체)
  # Slack: https://github.com/metalmatze/alertmanager-bot
  # Teams: https://github.com/prometheus-msteams/prometheus-msteams
  # ---------------------------------------------------------------------------
  jandi-adapter:
    image: timonwong/prometheus-webhook-dingtalk:v2.1.0
    container_name: jandi-adapter
    restart: always
    volumes:
      - ./jandi-adapter/config.yml:/etc/prometheus-webhook-dingtalk/config.yml:ro
      - ./alertmanager/templates:/etc/prometheus-webhook-dingtalk/templates:ro
    networks:
      - monitoring-tier

