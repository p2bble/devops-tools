#version: '3.8'

# =============================================================================
# Clobot Monitoring Stack v2.0
# мөңмў…мҲҳм •: 2026-03-18
# кө¬м„ұ: Prometheus + Alertmanager + Grafana + Exporters + Jandi Webhook Adapter
# =============================================================================

networks:
  app-tier:
    name: docker_app-tier
    external: true
  monitoring-tier:
    driver: bridge

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:

services:
  # -----------------------------------------------------------
  # Gateway Service (HAProxy)
  # -----------------------------------------------------------
  haproxy:
    image: haproxy:2.6.6-alpine
    container_name: haproxy
    restart: always
    volumes:
      - /storage/common/ssl/clobot.co.kr/clobot.pem:/usr/local/haproxy/SSL/clobot.pem
      - /storage/common/ssl/clobotspot.com/scope.clobotspot.pem:/usr/local/haproxy/SSL/scope.clobotspot.pem:ro
      - /storage/common/ssl/croms.co.kr/croms_2025.pem:/usr/local/haproxy/SSL/server.pem
      - ./haproxy/haproxy-dev-server.cfg:/usr/local/etc/haproxy/haproxy.cfg
    ports:
      - "80:80"
      - "443:443"
      - "1883:1883"
      - "5601:5601"
      - "7050:7050"
      # === Samsung ENA & Scout Demo MQTT Ports ===
      - "21084:21084" # кө¬ мҠӨм№ҙмҡ°нҠё лҚ°лӘЁ
      - "21085:21085" # мӮјм„ұ ENA лӘЁлӢҲн„°л§Ғ
      - "21086:21086" # мӮјм„ұ ENA м—”м§ҖлӢҲм–ҙл§Ғ
      - "7000:7000" # Lions-Agent
      - "9000:9000" # Gitlab
      - "9022:9022" # Gitlab
    networks:
      - app-tier
      - monitoring-tier
    logging:
      driver: "gelf"
      options:
        gelf-address: "udp://172.18.100.20:12201"
        tag: "haproxy"

  # ---------------------------------------------------------------------------
  # Prometheus (л©”нҠёлҰӯ мҲҳм§‘ м—”м§„)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: always
    user: "65534:65534"      # nobody:nobody (ліҙм•Ҳ)
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=180d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.listen-address=0.0.0.0:9099'
      - '--web.enable-lifecycle'             # /-/reload API н—Ҳмҡ©
      - '--web.enable-admin-api'
      - '--log.level=warn'
    ports:
      - "127.0.0.1:9099:9099"               # лЎңм»¬нҳёмҠӨнҠём—җм„ңл§Ң м ‘к·ј (HAProxy кІҪмң )
    networks:
      - monitoring-tier
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9099/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Alertmanager (м•ҢлһҢ лқјмҡ°нҢ… & мӨ‘ліөм ңкұ°)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    restart: always
    user: "65534:65534"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--cluster.listen-address='          # лӢЁмқј л…ёл“ң лӘЁл“ң (v0.28+)
      - '--log.level=warn'
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring-tier
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Grafana (мӢңк°Ғнҷ” лҢҖмӢңліҙл“ң)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: always
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "127.0.0.1:38889:3000"              # HAProxy кІҪмң  мҷёл¶Җ м ‘к·ј
    environment:
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme!}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=true
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,grafana-polystat-panel
      - GF_UNIFIED_ALERTING_ENABLED=false    # Grafana м•ҢлҰјмқҖ Prometheus/AlertmanagerлЎң нҶөн•©
      - TZ=Asia/Seoul
    networks:
      - monitoring-tier
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # SNMP Exporter (л„ӨнҠёмӣҢнҒ¬ мһҘл№„: FortiGate, Cisco, Netgear, Aruba, Axgate)
  # ---------------------------------------------------------------------------
  snmp-exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: snmp-exporter
    restart: always
    volumes:
      - ./snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - '--config.file=/etc/snmp_exporter/snmp.yml'
      - '--log.level=warn'
    ports:
      - "127.0.0.1:9116:9116"
    networks:
      - monitoring-tier

  # ---------------------------------------------------------------------------
  # Blackbox Exporter (HTTP/TCP/ICMP м—”л“ңнҸ¬мқёнҠё к°Җмҡ©м„ұ)
  # ---------------------------------------------------------------------------
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: always
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "127.0.0.1:9115:9115"
    dns:
      # ---------------------------------------------------------------
      # [мҲҳм •] 172.10.100.20 вҶ’ 172.18.100.20 (CoreDNS on vm-server-01)
      # CoreDNSк°Җ лӮҙл¶Җ лҸ„л©”мқёмқ„ HAProxy лӮҙл¶ҖIP(172.18.100.48)лЎң н•ҙм„қ
      # вҶ’ Hairpin NAT л¬ём ң н•ҙкІ°, extra_hosts л¶Ҳн•„мҡ”
      # ---------------------------------------------------------------
      - 172.18.100.20
      - 8.8.8.8
    networks:
      - monitoring-tier
      - app-tier               # лӮҙл¶Җ лҢҖм—ӯ(172.18.x/172.19.x) м ‘к·јмҡ©
    cap_add:
      - NET_RAW                              # ICMP probe мҡ©

  # ---------------------------------------------------------------------------
  # HAProxy Exporter
  # ---------------------------------------------------------------------------
  haproxy-exporter:
    image: prom/haproxy-exporter:v0.15.0
    container_name: haproxy-exporter
    restart: always
    command:
      - '--haproxy.scrape-uri=http://clobot:${HAPROXY_STATS_PASSWORD:-ansdufdj1*}@haproxy:9001/haproxy?stats;csv'
      - '--log.level=warn'
    networks:
      - app-tier
      - monitoring-tier

  # ---------------------------------------------------------------------------
  # Jandi Webhook Adapter (мһ”л”” м•ҢлһҢ м—°лҸҷ)
  # Prometheus Alertmanager вҶ’ мқҙ м–ҙлҢ‘н„° вҶ’ мһ”л”” Incoming Webhook
  # ---------------------------------------------------------------------------
  jandi-adapter:
    image: timonwong/prometheus-webhook-dingtalk:v2.1.0
    container_name: jandi-adapter
    restart: always
    volumes:
      - ./jandi-adapter/config.yml:/etc/prometheus-webhook-dingtalk/config.yml:ro
      - ./alertmanager/templates:/etc/prometheus-webhook-dingtalk/templates:ro
    command:
      - '--config.file=/etc/prometheus-webhook-dingtalk/config.yml'
      - '--log.level=warn'
    networks:
      - monitoring-tier

  # ---------------------------------------------------------------------------
  # FortiGate Exporter (UTM мғҒнғң мҲҳм§‘ - FortiOS REST API кё°л°ҳ)
  # л№Ңл“ң м „ н•„мҡ”: git clone https://github.com/prometheus-community/fortigate_exporter ./fortigate-exporter/src
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # FortiGate Exporter (UTM REST API - prometheuscommunity/fortigate-exporter)
  # SNMP ҙлҪЕ REST API·О АОЕНЖдАМҪә ҪЗёнДӘ/FortiAP/WiFi јцБэ
  # БЦАЗ: fortigate-key.yaml ГЦ»уА§ Е°ҙВ URL БчБў »зҝл (targets: ·ЎЖЫ ұЭБц)
  # БЦАЗ: Switch/ManagedSwitch probe №ЭөеҪГ exclude (БЯә№ ёЮЖ®ёҜ №жБц)
  # ---------------------------------------------------------------------------
  fortigate-exporter:
    image: prometheuscommunity/fortigate-exporter:latest
    container_name: fortigate-exporter
    restart: always
    ports:
      - 127.0.0.1:9710:9710
    volumes:
      - ./fortigate-exporter/fortigate-key.yaml:/config/fortigate-key.yaml:ro
    command:
      - '--auth-file=/config/fortigate-key.yaml'
      - '--insecure'
    networks:
      - monitoring-tier

  # ---------------------------------------------------------------------------
  # AWS CloudWatch Exporter (YACE - RDS, ALB л“ұ)
  # ---------------------------------------------------------------------------
  aws-exporter:
    image: ghcr.io/nerdswords/yet-another-cloudwatch-exporter:v0.55.0
    container_name: aws-exporter
    restart: always
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
    volumes:
      - ./aws-exporter/config.yml:/tmp/config.yml:ro
    networks:
      - monitoring-tier
