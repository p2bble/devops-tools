# =============================================================================
# Prometheus Configuration
# 버전: 2.52.0
#
# ── 커스터마이징 가이드 ──────────────────────────────────────────────────────
# 1. external_labels.datacenter → 사이트 식별자 변경
# 2. [CUSTOMIZE] 주석 구간의 IP / nodename 을 실제 서버로 교체
# 3. 불필요한 job은 주석 처리 또는 삭제
# 4. 새 서버 추가: node-exporter 섹션에 targets 1줄 추가
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    datacenter: '${DATACENTER:-your-datacenter}'
    environment: '${ENVIRONMENT:-production}'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:

  # ---------------------------------------------------------------------------
  # [1] Prometheus Self-Monitoring
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9099']

  # ---------------------------------------------------------------------------
  # [2] 서버 OS 모니터링 (Node Exporter :9100)
  #
  # [CUSTOMIZE] targets IP와 nodename 레이블을 실제 서버로 교체
  #
  # 설치 (각 서버에서):
  #   docker run -d --name node-exporter --net="host" --pid="host" \
  #     -v "/:/host:ro,rslave" prom/node-exporter --path.rootfs=/host
  # ---------------------------------------------------------------------------
  - job_name: 'node-exporter'
    static_configs:
      # 예시 — 실제 서버 IP와 nodename으로 교체
      - targets: ['192.168.1.10:9100']
        labels:
          nodename: 'monitoring-server'
          role: 'infra'

      - targets: ['192.168.1.11:9100']
        labels:
          nodename: 'app-server-01'
          role: 'app'

      - targets: ['192.168.1.12:9100']
        labels:
          nodename: 'db-server-01'
          role: 'db'

      # Windows 서버는 windows_exporter 사용 (:9182)
      # - targets: ['192.168.1.20:9182']
      #   labels:
      #     nodename: 'windows-server-01'
      #     role: 'erp'

  # ---------------------------------------------------------------------------
  # [3] KVM / Libvirt 가상화 모니터링 (KVM 호스트에만 해당)
  #
  # 설치: https://github.com/prometheus-community/libvirt_exporter
  # ---------------------------------------------------------------------------
  - job_name: 'libvirt-exporter'
    static_configs:
      # [CUSTOMIZE] KVM 호스트 IP로 교체
      - targets: ['192.168.1.10:9177']
        labels:
          nodename: 'kvm-host-01'

  # ---------------------------------------------------------------------------
  # [4] Docker 컨테이너 모니터링 (cAdvisor :8080)
  #
  # 설치:
  #   docker run -d --name cadvisor --privileged \
  #     -v /:/rootfs:ro -v /var/run:/var/run:ro -v /sys:/sys:ro \
  #     -v /var/lib/docker/:/var/lib/docker:ro \
  #     -p 8080:8080 gcr.io/cadvisor/cadvisor:latest
  # ---------------------------------------------------------------------------
  - job_name: 'cadvisor'
    static_configs:
      # [CUSTOMIZE] Docker 호스트 IP 목록
      - targets: ['192.168.1.10:8080']
        labels:
          nodename: 'monitoring-server'
      - targets: ['192.168.1.11:8080']
        labels:
          nodename: 'app-server-01'

  # ---------------------------------------------------------------------------
  # [5] SNMP 모니터링 (네트워크 장비: 스위치, 방화벽, AP 등)
  #
  # [CUSTOMIZE] 네트워크 장비 IP 목록 및 모듈 지정
  # 지원 장비: FortiGate(fortigate), Cisco(if_mib), Aruba(aruba_cx) 등
  # ---------------------------------------------------------------------------
  - job_name: 'snmp-network'
    static_configs:
      - targets:
          - 192.168.1.1    # [CUSTOMIZE] 방화벽/라우터 IP
          - 192.168.1.2    # [CUSTOMIZE] 코어 스위치 IP
    metrics_path: /snmp
    params:
      module: [if_mib]    # [CUSTOMIZE] snmp.yml에 정의된 모듈명
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  # ---------------------------------------------------------------------------
  # [6] HTTP/HTTPS/ICMP 엔드포인트 가용성 (Blackbox Exporter)
  # ---------------------------------------------------------------------------
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # [CUSTOMIZE] 모니터링할 HTTP/HTTPS 엔드포인트 목록
          - https://your-service.example.com
          - https://your-grafana.example.com
          - https://your-gitlab.example.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'blackbox-icmp'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          # [CUSTOMIZE] Ping 모니터링 대상 IP 목록
          - 192.168.1.1   # 게이트웨이
          - 192.168.1.10  # 서버1
          - 192.168.1.11  # 서버2
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ---------------------------------------------------------------------------
  # [7] SSL 인증서 만료 모니터링 (Blackbox Exporter)
  # ---------------------------------------------------------------------------
  - job_name: 'blackbox-ssl'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # [CUSTOMIZE] SSL 인증서 모니터링할 도메인 목록
          - https://your-service.example.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ---------------------------------------------------------------------------
  # [8] HAProxy 로드밸런서 (HAProxy Exporter — 사용 시 활성화)
  # ---------------------------------------------------------------------------
  # - job_name: 'haproxy'
  #   static_configs:
  #     - targets: ['haproxy-exporter:9101']

  # ---------------------------------------------------------------------------
  # [9] FortiGate UTM (FortiGate Exporter — FortiGate 사용 시 활성화)
  # ---------------------------------------------------------------------------
  # - job_name: 'fortigate'
  #   static_configs:
  #     - targets: ['192.168.1.1']   # [CUSTOMIZE] FortiGate 관리 IP
  #   metrics_path: /probe
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - target_label: __address__
  #       replacement: fortigate-exporter:9710

  # ---------------------------------------------------------------------------
  # [10] AWS CloudWatch (YACE Exporter — AWS 사용 시 활성화)
  # ---------------------------------------------------------------------------
  # - job_name: 'aws-cloudwatch'
  #   static_configs:
  #     - targets: ['aws-exporter:5000']
