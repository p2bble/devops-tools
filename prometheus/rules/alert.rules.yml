################################################################################
# alert_rules.yml — Clobot Monitoring Alert Rules v2.3
# 최종수정: 2026-03-18
# 대상: Node Exporter / Libvirt / cAdvisor / Blackbox / HAProxy / FortiGate / iDRAC
################################################################################

groups:

  # ============================================================================
  # [1] 인스턴스 가용성 (Up/Down)
  # 미설치 타겟(cadvisor pdkcld1/vm-server-01, libvirt)은 제외
  # AWS EC2 인스턴스는 VPN/SG 구성 완료 전까지 알람 제외
  # ============================================================================
  - name: Availability
    rules:
      - alert: InstanceDown
        expr: >
          up{job!~"cadvisor|libvirt-exporter|aws-ec2-node-exporter"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "🔴 인스턴스 다운: {{ $labels.instance }}"
          description: "Job [{{ $labels.job }}] 의 {{ $labels.instance }} 가 2분 이상 응답하지 않습니다."

      # AWS EC2 — VPN 구성 전까지 별도 알람 (severity: info → 잔디 알림 미발송)
      - alert: AwsInstanceUnreachable
        expr: >
          up{job="aws-ec2-node-exporter"} == 0
        for: 10m
        labels:
          severity: info
          category: availability
        annotations:
          summary: >-
            ℹ️ AWS 인스턴스 미도달:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
          description: >-
            AWS EC2
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
            에 10분 이상 접근 불가. VPN/SG 설정 확인 필요.

      # cadvisor/libvirt는 설치된 것만 알람 (dev-server cAdvisor 등)
      - alert: InstalledAgentDown
        expr: >
          up{job=~"cadvisor|libvirt-exporter", instance=~"172.19.100.20.*"} == 0
        for: 2m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "⚠️ 에이전트 다운: {{ $labels.instance }} ({{ $labels.job }})"
          description: "설치된 에이전트 {{ $labels.job }} / {{ $labels.instance }} 가 응답하지 않습니다."

  # ============================================================================
  # [2] 서버 OS 리소스 (Node Exporter)
  # ============================================================================
  - name: NodeResources
    rules:

      - alert: HighCpuUsage
        expr: >
          100 - (avg by(instance, nodename) (
            rate(node_cpu_seconds_total{mode="idle"}[5m])
          ) * 100) > 85
        for: 5m
        labels:
          severity: warning
          category: compute
        annotations:
          summary: >-
            ⚠️ CPU 과부하:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
          description: "CPU 사용률 {{ $value | printf \"%.1f\" }}% (임계치: 85%, 5분 지속)"

      - alert: CriticalCpuUsage
        expr: >
          100 - (avg by(instance, nodename) (
            rate(node_cpu_seconds_total{mode="idle"}[5m])
          ) * 100) > 95
        for: 2m
        labels:
          severity: critical
          category: compute
        annotations:
          summary: >-
            🔴 CPU 위험 수준:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
          description: "CPU 사용률 {{ $value | printf \"%.1f\" }}% (임계치: 95%, 2분 지속)"

      - alert: HighMemoryUsage
        expr: >
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: compute
        annotations:
          summary: >-
            ⚠️ 메모리 과부하:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
          description: "메모리 사용률 {{ $value | printf \"%.1f\" }}% (임계치: 85%, 5분 지속)"

      - alert: CriticalMemoryUsage
        expr: >
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes * 100 > 95
        for: 2m
        labels:
          severity: critical
          category: compute
        annotations:
          summary: >-
            🔴 메모리 위험:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
          description: "메모리 사용률 {{ $value | printf \"%.1f\" }}% (임계치: 95%, 2분 지속)"

      - alert: LowDiskSpace
        expr: >
          node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|devtmpfs",mountpoint!~"/boot.*"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|devtmpfs",mountpoint!~"/boot.*"}
          * 100 < 15
        for: 5m
        labels:
          severity: warning
          category: storage
        annotations:
          summary: >-
            ⚠️ 디스크 공간 부족:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
            ({{ $labels.mountpoint }})
          description: "가용 공간 {{ $value | printf \"%.1f\" }}% (임계치: 15%)"

      - alert: CriticalDiskSpace
        expr: >
          node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|devtmpfs",mountpoint!~"/boot.*"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|devtmpfs",mountpoint!~"/boot.*"}
          * 100 < 5
        for: 2m
        labels:
          severity: critical
          category: storage
        annotations:
          summary: >-
            🔴 디스크 거의 가득참:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
            ({{ $labels.mountpoint }})
          description: "가용 공간 {{ $value | printf \"%.1f\" }}% (임계치: 5%)"

      - alert: HighDiskIOWait
        expr: >
          rate(node_cpu_seconds_total{mode="iowait"}[5m]) * 100 > 20
        for: 5m
        labels:
          severity: warning
          category: storage
        annotations:
          summary: >-
            ⚠️ 디스크 I/O 대기 높음:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
          description: "I/O Wait {{ $value | printf \"%.1f\" }}% (임계치: 20%, 5분 지속)"

      - alert: HighNetworkIn
        expr: >
          rate(node_network_receive_bytes_total{device!~"lo|veth.*|docker.*|br-.*"}[5m]) * 8 / 1e6 > 800
        for: 10m
        labels:
          severity: warning
          category: network
        annotations:
          summary: >-
            ⚠️ 인바운드 트래픽 폭증:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
            ({{ $labels.device }})
          description: "수신 트래픽 {{ $value | printf \"%.0f\" }} Mbps (임계치: 800 Mbps, 10분 지속)"

      - alert: HighNetworkOut
        expr: >
          rate(node_network_transmit_bytes_total{device!~"lo|veth.*|docker.*|br-.*"}[5m]) * 8 / 1e6 > 800
        for: 10m
        labels:
          severity: warning
          category: network
        annotations:
          summary: >-
            ⚠️ 아웃바운드 트래픽 폭증:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
            ({{ $labels.device }})
          description: "송신 트래픽 {{ $value | printf \"%.0f\" }} Mbps (임계치: 800 Mbps, 10분 지속)"

      - alert: HighSystemLoad
        expr: >
          node_load15 / count without(cpu, mode)(
            node_cpu_seconds_total{mode="idle"}
          ) > 2.0
        for: 10m
        labels:
          severity: warning
          category: compute
        annotations:
          summary: >-
            ⚠️ 시스템 로드 높음:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
          description: "15분 로드 평균이 CPU 코어 수의 2배 초과 (현재: {{ $value | printf \"%.2f\" }})"

      - alert: NodeReboot
        expr: node_time_seconds - node_boot_time_seconds < 600
        for: 0m
        labels:
          severity: info
          category: availability
        annotations:
          summary: >-
            ℹ️ 서버 재부팅 감지:
            {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }}
          description: "서버가 10분 이내에 재부팅되었습니다."

  # ============================================================================
  # [3] KVM VM 리소스 (Libvirt Exporter)
  # vstate: 1=running, 2=blocked, 3=paused, 4=shutdown, 5=shutoff, 6=crashed
  # 꺼진 VM(vstate=5)은 정상 운영 상태이므로 알람 제외
  #
  # CPU 임계치 변경 이력:
  #   v2.2: 90% / 10분 → 잦은 오탐 (다중 vCPU VM에서 합산 CPU가 수백% 가능)
  #   v2.3: vCPU 수 기준 정규화. 예: 4 vCPU VM → 400% 가능, 임계치 = vCPU당 85%
  # ============================================================================
  - name: LibvirtVMs
    rules:

      - alert: VMHighCpuUsage
        # running 상태(vstate=1) VM만, vCPU 수 대비 정규화된 CPU 사용률
        # 예: 4 vCPU VM이 340% 사용 → 정규화 85% → 알람 발생
        expr: >
          (
            rate(libvirt_domain_info_cpu_time_seconds_total[5m]) * 100
            / libvirt_domain_info_virtual_cpus
          ) > 85
          and on(domain) libvirt_domain_info_vstate == 1
        for: 15m
        labels:
          severity: warning
          category: compute
        annotations:
          summary: "⚠️ VM CPU 높음: {{ $labels.domain }}"
          description: >-
            VM [{{ $labels.domain }}] vCPU당 CPU {{ $value | printf "%.1f" }}%
            (임계치: vCPU당 85%, 15분 지속)

      - alert: VMCriticalCpuUsage
        # vCPU당 95% 초과 — 5분 지속 시 critical
        expr: >
          (
            rate(libvirt_domain_info_cpu_time_seconds_total[5m]) * 100
            / libvirt_domain_info_virtual_cpus
          ) > 95
          and on(domain) libvirt_domain_info_vstate == 1
        for: 5m
        labels:
          severity: critical
          category: compute
        annotations:
          summary: "🔴 VM CPU 위험: {{ $labels.domain }}"
          description: >-
            VM [{{ $labels.domain }}] vCPU당 CPU {{ $value | printf "%.1f" }}%
            (임계치: vCPU당 95%, 5분 지속)

      - alert: VMCrashed
        # crashed 상태(vstate=6)만 알람 — shutdown(5)은 정상
        expr: libvirt_domain_info_vstate == 6
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "🔴 VM 크래시: {{ $labels.domain }}"
          description: "VM [{{ $labels.domain }}] 가 crashed 상태입니다. 즉시 확인 필요!"

      - alert: VMUnexpectedShutdown
        # 예상치 못한 종료: paused(3) 상태가 지속
        expr: libvirt_domain_info_vstate == 3
        for: 5m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "⚠️ VM 일시정지 상태: {{ $labels.domain }}"
          description: "VM [{{ $labels.domain }}] 가 5분 이상 paused 상태입니다."

  # ============================================================================
  # [4] 서비스 엔드포인트 가용성 (Blackbox Exporter)
  # ============================================================================
  - name: Endpoints
    rules:

      - alert: HttpEndpointDown
        expr: probe_success{job=~"blackbox-http.*"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "🔴 HTTP 서비스 다운: {{ $labels.instance }}"
          description: "{{ $labels.instance }} 가 2분 이상 HTTP 응답에 실패했습니다."

      - alert: HttpSlowResponse
        # 임계치 변경: 3초/5분 → 5초/10분 (외부 도메인 경유 시 네트워크 지연 반영)
        expr: probe_duration_seconds{job=~"blackbox-http.*"} > 5
        for: 10m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "⚠️ HTTP 응답 지연: {{ $labels.instance }}"
          description: "응답 시간 {{ $value | printf \"%.2f\" }}초 (임계치: 5초, 10분 지속)"

      - alert: SslCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry{job=~"blackbox-http.*"} - time() < 86400 * 21
        for: 1h
        labels:
          severity: warning
          category: security
        annotations:
          summary: "⚠️ SSL 인증서 만료 임박: {{ $labels.instance }}"
          description: "SSL 인증서가 {{ $value | humanizeDuration }} 내에 만료됩니다. (21일 이내)"

      - alert: SslCertExpired
        expr: probe_ssl_earliest_cert_expiry{job=~"blackbox-http.*"} - time() < 0
        for: 0m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "🔴 SSL 인증서 만료됨: {{ $labels.instance }}"
          description: "SSL 인증서가 이미 만료되었습니다. 즉시 갱신 필요!"

      - alert: TcpEndpointDown
        expr: probe_success{job="blackbox-tcp"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "🔴 TCP 서비스 다운: {{ $labels.instance }}"
          description: "{{ $labels.instance }} TCP 연결이 2분 이상 실패했습니다."

      - alert: IcmpHostDown
        expr: probe_success{job="blackbox-icmp"} == 0
        for: 3m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "⚠️ 호스트 핑 응답 없음: {{ $labels.instance }}"
          description: "{{ $labels.instance }} 에 3분 이상 ICMP 응답이 없습니다."

  # ============================================================================
  # [5] HAProxy 로드밸런서
  # ============================================================================
  - name: HAProxy
    rules:

      - alert: HaproxyBackendDown
        expr: haproxy_backend_up == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "🔴 HAProxy 백엔드 다운: {{ $labels.backend }}"
          description: "HAProxy 백엔드 [{{ $labels.backend }}] 의 모든 서버가 다운되었습니다."

      - alert: HaproxyServerDown
        expr: haproxy_server_up == 0
        for: 1m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "⚠️ HAProxy 서버 다운: {{ $labels.backend }}/{{ $labels.server }}"
          description: "HAProxy 백엔드 [{{ $labels.backend }}] 의 서버 {{ $labels.server }} 가 다운되었습니다."

      - alert: HaproxyHighQueueTime
        expr: haproxy_server_queue_time_average_seconds > 0.5
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "⚠️ HAProxy 큐 대기시간 높음: {{ $labels.backend }}"
          description: "평균 큐 대기시간 {{ $value | printf \"%.3f\" }}초 (임계치: 0.5초)"

      - alert: HaproxyHighResponseTime
        expr: haproxy_server_response_time_average_seconds > 2
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "⚠️ HAProxy 응답시간 높음: {{ $labels.backend }}/{{ $labels.server }}"
          description: "평균 응답시간 {{ $value | printf \"%.2f\" }}초 (임계치: 2초)"

  # ============================================================================
  # [6] FortiGate UTM (SNMP fortigate_mib)
  # ============================================================================
  - name: FortiGate
    rules:

      - alert: FortiGateCpuHigh
        expr: fgSysCpuUsage > 80
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "⚠️ FortiGate CPU 높음: {{ $labels.instance }}"
          description: "FortiGate CPU {{ $value }}% (임계치: 80%, 5분 지속)"

      - alert: FortiGateMemoryHigh
        expr: fgSysMemUsage > 85
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "⚠️ FortiGate 메모리 높음: {{ $labels.instance }}"
          description: "FortiGate 메모리 {{ $value }}% (임계치: 85%)"

      - alert: FortiGateSessionCountHigh
        expr: fgSysSesCount > 500000
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "⚠️ FortiGate 세션 수 높음: {{ $labels.instance }}"
          description: "현재 세션 수: {{ $value | humanize }} (임계치: 500,000)"

  # ============================================================================
  # [7] Dell iDRAC 하드웨어 상태 (SNMP)
  # ============================================================================
  - name: iDRAC
    rules:

      - alert: DellSystemStatusWarning
        expr: dellSystemStatus == 4
        for: 1m
        labels:
          severity: warning
          category: hardware
        annotations:
          summary: "⚠️ Dell 서버 하드웨어 경고: {{ $labels.instance }}"
          description: "Dell iDRAC 시스템 상태: WARNING (값=4). 팬/온도/전원 확인 필요."

      - alert: DellSystemStatusCritical
        expr: dellSystemStatus == 5
        for: 1m
        labels:
          severity: critical
          category: hardware
        annotations:
          summary: "🔴 Dell 서버 하드웨어 장애: {{ $labels.instance }}"
          description: "Dell iDRAC 시스템 상태: CRITICAL (값=5). 즉시 현장 확인 필요!"

      - alert: DellTemperatureHigh
        expr: dellTemperatureReading * 0.1 > 70
        for: 3m
        labels:
          severity: warning
          category: hardware
        annotations:
          summary: "⚠️ Dell 서버 온도 높음: {{ $labels.instance }}"
          description: "{{ $labels.temp_name }}: {{ $value | printf \"%.1f\" }}°C (임계치: 70°C)"

  # ============================================================================
  # [8] 컨테이너 (cAdvisor) — memory limit 설정된 컨테이너만
  # ============================================================================
  - name: Containers
    rules:

      - alert: ContainerHighCpuUsage
        expr: >
          rate(container_cpu_usage_seconds_total{
            image!="",
            container!~"POD|pause"
          }[5m]) * 100 > 90
        for: 5m
        labels:
          severity: warning
          category: compute
        annotations:
          summary: "⚠️ 컨테이너 CPU 높음: {{ $labels.name }}"
          description: "컨테이너 [{{ $labels.name }}] CPU {{ $value | printf \"%.1f\" }}% (임계치: 90%, 5분 지속)"

      - alert: ContainerHighMemoryUsage
        expr: >
          (container_memory_working_set_bytes{image!="", container!~"POD|pause"}
          / container_spec_memory_limit_bytes{image!="", container!~"POD|pause"} * 100 > 90)
          and
          container_spec_memory_limit_bytes{image!="", container!~"POD|pause"} > 0
        for: 5m
        labels:
          severity: warning
          category: compute
        annotations:
          summary: "⚠️ 컨테이너 메모리 높음: {{ $labels.name }}"
          description: "컨테이너 [{{ $labels.name }}] 메모리 {{ $value | printf \"%.1f\" }}% (limit 대비)"

      - alert: ContainerOOMKilled
        expr: >
          increase(container_oom_events_total{
            image!="",
            container!~"POD|pause"
          }[5m]) > 0
        for: 0m
        labels:
          severity: critical
          category: compute
        annotations:
          summary: "🔴 컨테이너 OOM Kill 발생: {{ $labels.name }}"
          description: "컨테이너 [{{ $labels.name }}] 가 메모리 부족으로 종료되었습니다."
