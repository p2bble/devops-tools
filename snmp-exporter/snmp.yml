# =============================================================================
# SNMP Exporter Configuration
# community 문자열을 실제 값으로 변경 필요
# =============================================================================

auths:
  your_community_name:           # 실제 SNMP community 이름으로 변경
    community: your_community    # 실제 community 문자열로 변경
    version: 2

modules:

  # 표준 네트워크 인터페이스 (Cisco, Netgear, Aruba 등)
  if_mib_standard:
    walk:
      - 1.3.6.1.2.1.1
      - 1.3.6.1.2.1.2
      - 1.3.6.1.2.1.31.1.1
    metrics:
      - name: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
        help: Interface Name
        indexes:
          - labelname: ifIndex
            type: Integer

      - name: ifAlias
        oid: 1.3.6.1.2.1.31.1.1.1.18
        type: DisplayString
        help: Interface Alias
        indexes:
          - labelname: ifIndex
            type: Integer

      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: "Operational status (1=up, 2=down)"
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1

      - name: ifHighSpeed
        oid: 1.3.6.1.2.1.31.1.1.1.15
        type: gauge
        help: Interface speed in Mbps
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1

      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: Inbound octets (64-bit)
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1

      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: Outbound octets (64-bit)
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1

  # Axgate/Iptime 계열 장비
  if_mib_iptime:
    walk:
      - 1.3.6.1.2.1.1
      - 1.3.6.1.2.1.2
      - 1.3.6.1.2.1.31

  # FortiGate UTM (FORTINET-FORTIGATE-MIB)
  fortigate_mib:
    walk:
      - 1.3.6.1.2.1.1
      - 1.3.6.1.2.1.2
      - 1.3.6.1.2.1.31.1.1
      - 1.3.6.1.4.1.12356.101.4.1
      - 1.3.6.1.4.1.12356.101.4.2
    metrics:
      - name: fgSysCpuUsage
        oid: 1.3.6.1.4.1.12356.101.4.1.3.0
        type: gauge
        help: "FortiGate CPU usage (%)"

      - name: fgSysMemUsage
        oid: 1.3.6.1.4.1.12356.101.4.1.4.0
        type: gauge
        help: "FortiGate memory usage (%)"

      - name: fgSysSesCount
        oid: 1.3.6.1.4.1.12356.101.4.2.4.0
        type: gauge
        help: "Current session count"

      - name: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
        help: Interface Name
        indexes:
          - labelname: ifIndex
            type: Integer

      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: "Interface operational status (1=up, 2=down)"
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1

      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: Inbound octets (64-bit)
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1

      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: Outbound octets (64-bit)
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1

  # Dell iDRAC (PowerEdge 서버)
  dell_idrac:
    walk:
      - 1.3.6.1.4.1.674.10892.5
    metrics:
      - name: dellSystemStatus
        oid: 1.3.6.1.4.1.674.10892.5.2.1.0
        type: gauge
        help: "Overall system health (3=ok, 4=warning, 5=critical)"

      - name: dellFanSpeedRPM
        oid: 1.3.6.1.4.1.674.10892.5.4.700.12.1.6
        type: gauge
        help: "Fan speed in RPM"
        indexes:
          - labelname: fan_index
            type: Integer
        lookups:
          - labels: [fan_index]
            labelname: fan_name
            oid: 1.3.6.1.4.1.674.10892.5.4.700.12.1.8

      - name: dellTemperatureReading
        oid: 1.3.6.1.4.1.674.10892.5.4.700.20.1.6
        type: gauge
        help: "Temperature in tenths of Celsius (divide by 10)"
        indexes:
          - labelname: temp_index
            type: Integer
        lookups:
          - labels: [temp_index]
            labelname: temp_name
            oid: 1.3.6.1.4.1.674.10892.5.4.700.20.1.2

      - name: dellPowerConsumptionWatts
        oid: 1.3.6.1.4.1.674.10892.5.4.600.30.1.6
        type: gauge
        help: "Power consumption in Watts"
        indexes:
          - labelname: power_index
            type: Integer
